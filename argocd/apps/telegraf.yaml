apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telegraf
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/terrorbollen/homelab
    targetRevision: HEAD
    path: charts/monitoring/telegraf
    helm:
      releaseName: telegraf-ds
  destination:
    server: https://kubernetes.default.svc
    namespace: telegraf
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
