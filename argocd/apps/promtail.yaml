apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/terrorbollen/homelab
    targetRevision: HEAD
    path: charts/monitoring/promtail
    helm:
      releaseName: promtail
  destination:
    server: https://kubernetes.default.svc
    namespace: promtail
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
