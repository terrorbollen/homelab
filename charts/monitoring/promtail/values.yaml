loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    limits_config:
      retention_period: 720h
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi

  # Disable SimpleScalable microservice components
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

promtail:
  daemonset:
    enabled: true
  configmap:
    enabled: true

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "http-metrics"

  resources:
    limits:
      cpu: 200m
    requests:
      cpu: 100m

  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0

  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  extraArgs:
    - -client.external-labels=hostname=$(HOSTNAME)

  extraEnv:
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  extraVolumes:
    - name: journal
      hostPath:
        path: /var/log/journal
    - name: machine-id
      hostPath:
        path: /etc/machine-id

  extraVolumeMounts:
    - name: journal
      mountPath: /var/log/journal
      readOnly: true
    - name: machine-id
      mountPath: /etc/machine-id
      readOnly: true

  config:
    clients:
      - url: http://loki-gateway/loki/api/v1/push
    snippets:
      extraScrapeConfigs: |
        - job_name: journal
          journal:
            path: /var/log/journal
            max_age: 12h
            labels:
              job: systemd-journal
          relabel_configs:
            - source_labels:
                - __journal__hostname
              target_label: hostname
            - source_labels:
                - __journal__systemd_unit
              target_label: unit
            - source_labels:
                - __journal__priority_keyword
              target_label: level
