grafana:
  adminUser: admin
  adminPassword: strongpassword
  persistence:
    type: pvc
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    annotations: 
      helm.sh/resource-policy: keep
    finalizers:
      - kubernetes.io/pvc-protection

  service:
    enabled: true
    type: ClusterIP
    port: 81
    targetPort: 3000

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingressClassName: traefik
      kubernetes.io/tls-acme: "true"
    path: /
    pathType: Prefix
    hosts:
      - "grafana.192.168.0.36.nip.io"
    # tls:
    #   - hosts:
    #       - friis-jespersen.dev
    #     secretName: friisjespersen-com-tls
