  volumes:
    - name: "media-ssd"
      persistentVolumeClaim:
        claimName: "media-ssd"

  volumeMounts:
    - name: "media-ssd"
      mountPath: "/config"
      subPath: "configs/radarr"
    - name: "media-ssd"
      mountPath: "/downloads/transmission"
      subPath: "downloads/transmission"
    - name: media-ssd
      mountPath: "/movies"
      subPath: "library/movies"

  resources:
    requests:
      cpu: "100m"
      memory: "250Mi"
    limits:
      cpu: "500m"
      memory: "350Mi"

sonarr:
  replicaCount: 1

  image:
    repository: linuxserver/sonarr
    tag: latest
    pullPolicy: IfNotPresent

  env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"

