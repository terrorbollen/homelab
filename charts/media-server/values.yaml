# Default values for mediaserver chart
# This is a YAML-formatted file.

bazarr:
  image:
    repository: ghcr.io/home-operations/bazarr
    pullPolicy: IfNotPresent

  service:
    main:
      ports:
        main:
          port: 80
          protocol: http
          targetPort: 6767

  securityContext:
    container:
      PUID: 1000 
      runAsUser: 1000
      runAsGroup: 1000
    pod:
      fsGroup: 1000
      supplementalGroups:
        # - 568
        - 1000

  persistence:
    config:
      enabled: true
      type: pvc
      retain: true
      size: 1Gi

    media:
      enabled: true
      type: pvc
      volumeName: media-ssd
      existingClaim: media-ssd
      mountPath: "/movies"
      subPath: "library/movies"

    tv:
      enabled: true
      type: pvc
      volumeName: media-ssd
      existingClaim: media-ssd
      mountPath: "/tv"
      subPath: "library/tv"




emby:
  replicaCount: 1
  image:
    repository: linuxserver/emby
    pullPolicy: IfNotPresent

  env:
    - name: TZ
      value: "UTC"
    - name: UID
      value: "1000"
    - name: GID
      value: "1000"

  service:
    type: ClusterIP
    port: 80

  volumes:
    - name: "media-ssd"
      persistentVolumeClaim:
        claimName: "media-ssd"

  volumeMounts:
    - name: media-ssd
      mountPath: "/config"
      subPath: "configs/emby"
    - name: media-ssd
      mountPath: "/tv"
      subPath: "library/tv"
    - name: media-ssd
      mountPath: "/movies"
      subPath: "library/movies"


prowlarr:
  replicaCount: 1

  image:
    repository: linuxserver/prowlarr
    tag: latest 
    pullPolicy: IfNotPresent

  env:
    - name: TZ
      value: UTC
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"

  service:
    main:
      ports:
        http:
          port: 80
          targetPort: 9696

  persistence:
    configs:
      enabled: true
      existingClaim: media-ssd
      mountPath: /config
      subPath: configs/prowlarr

  resources:
    requests:
      cpu: "100m"
      memory: "250Mi"
    limits:
      cpu: "500m"
      memory: "350Mi"

radarr:
  replicaCount: 1

  image:
    repository: linuxserver/radarr
    pullPolicy: IfNotPresent

  env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"

  service:
    type: ClusterIP
