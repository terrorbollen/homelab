transmission-openvpn:
  replicaCount: 1

  image:
    repository: "haugene/transmission-openvpn"
    tag: "latest"
    pullPolicy: "IfNotPresent"

  env:
    - name: OPENVPN_PROVIDER
      value: "MULLVAD"
    - name: OPENVPN_USERNAME
      valueFrom:
        secretKeyRef:
          name: "mullvad"
          key: "username"
    - name: OPENVPN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "mullvad"
          key: "password"
    - name: OPENVPN_CONFIG
      value: se_all
    - name: LOCAL_NETWORK
      value: "192.168.0.0/24"
    - name: TRANSMISSION_PEER_PORT
      value: "47444"
    - name: TRANSMISSION_DOWNLOAD_DIR
      value: "/downloads/transmission"
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    - name: CREATE_TUN_DEVICE
      value: "false"

  service:
    type: ClusterIP
    port: 80

  volumes:
    - name: "media-ssd"
      persistentVolumeClaim:
        claimName: "media-ssd"
    - name: "dev-tun"
      hostPath:
        path: "/dev/net/tun"

  volumeMounts:
    - name: "media-ssd"
      mountPath: "/data"
      subPath: "configs/transmission-data"
    - name: "media-ssd"
      mountPath: "/downloads/transmission"
      subPath: "downloads/transmission"
    - name: "dev-tun"
      mountPath: "/dev/net/tun"

  securityContext:
    capabilities:
      add:
        - NET_ADMIN

  resources:
    requests:
      cpu: "100m"
      memory: "250Mi"
    limits:
      cpu: "500m"
      memory: "350Mi"

# Ingress configuration
ingress:
  enabled: true
  class: traefik
  ip: "192.168.0.36"
  host: "" # Leave empty to use nip.io with the IP
  annotations: {}

storage:
  persistentVolume:
    create: true
    name: "media-ssd"
    labels:
      type: "local"
    capacity: "2Ti"
    accessMode: ReadWriteMany
    hostPath: "/mnt/ssd/media"

  persistentVolumeClaim:
    create: true
    name: "media-ssd"
    accessMode: ReadWriteMany
    capacity: "2Ti"
